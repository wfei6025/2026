<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 关键meta：适配微信内嵌浏览器，禁止缩放，保证清晰度 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no, email=no">
    <meta name="wechat-debug" content="off">  <!-- 关闭微信调试 -->
    <title>每日点检 · 微信适配版</title>
    <style>
        /* 全局图标自定义变量 —— 修改这里即可整体调整 */
        .app-container {
            --icon-size: 58px;           /* 图标大小（适应手指点击） */
            --icon-pos-x: 0px;            /* 水平偏移 */
            --icon-pos-y: 0px;             /* 垂直偏移 */
            --icon-scale: 1.1;             /* 内部符号缩放 */
            --icon-color-bg: #2b6eb0;       /* 背景色 */
            --icon-color-fg: #ffd966;       /* 符号色 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }  /* 去掉微信触摸灰块 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f5fd; min-height: 100vh; padding: 12px;
            color: #1b3147;
        }
        .app-container {
            max-width: 900px; margin: 0 auto; background: white;
            border-radius: 36px; box-shadow: 0 20px 40px rgba(0,30,70,0.12);
            padding: 18px 18px 30px;
            /* 增加安全区域，微信内更好看 */
        }
        h1 {
            font-size: 1.9rem; font-weight: 700; display: flex;
            align-items: center; gap: 8px; color: #0f3760; margin-bottom: 8px;
        }
        h1 small { font-size: 0.85rem; font-weight: 400; color: #6e8eb2; margin-left: auto; }

        /* 顶部栏：日期、人员、管理员图标 (加大触摸区域) */
        .toolbar {
            display: flex; flex-wrap: wrap; align-items: center;
            background: #e7f1fc; border-radius: 50px; padding: 10px 16px;
            margin: 12px 0 18px; gap: 12px;
        }
        .date-picker, .inspector-picker {
            display: flex; align-items: center; gap: 6px; background: white;
            padding: 10px 18px; border-radius: 40px; flex: 1 1 180px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .date-picker label, .inspector-picker label { font-weight: 600; color: #1d5382; font-size: 1.2rem; }
        .date-picker input, .inspector-picker select {
            border: none; background: transparent; font-size: 0.95rem;
            outline: none; color: #14273e; font-weight: 500; flex: 1;
            font-family: inherit;
        }
        /* 微信内日期输入适配 */
        .date-picker input[type="date"]::-webkit-date-and-time-value { text-align: left; }

        /* 完全可自定义的管理员图标 (加大热区) */
        .admin-icon {
            background: var(--icon-color-bg);
            color: var(--icon-color-fg);
            width: var(--icon-size);
            height: var(--icon-size);
            min-width: var(--icon-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--icon-size) * 0.65 * var(--icon-scale));
            font-weight: 600;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(30,100,180,0.3);
            transition: 0.1s;
            flex-shrink: 0;
            transform: translate(var(--icon-pos-x), var(--icon-pos-y));
            -webkit-transform: translate(var(--icon-pos-x), var(--icon-pos-y)); /* 微信兼容 */
        }
        .admin-icon:active { 
            transform: translate(var(--icon-pos-x), var(--icon-pos-y)) scale(0.94);
            -webkit-transform: translate(var(--icon-pos-x), var(--icon-pos-y)) scale(0.94);
            opacity: 0.85;
        }

        /* 项目勾选栏 (手指友好) */
        .project-selector {
            background: #eaf3ff; border-radius: 40px; padding: 14px 18px;
            margin: 8px 0 18px; display: flex; flex-wrap: wrap;
            align-items: center; gap: 15px;
        }
        .selector-label {
            font-weight: 700; color: #1e4f7a; font-size: 1.1rem;
        }
        .selector-options {
            display: flex; flex-wrap: wrap; gap: 12px; flex: 1;
        }
        .project-check {
            background: white; padding: 8px 20px; border-radius: 60px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 2px 8px #b5d0eb; cursor: pointer;
            transition: 0.1s;
            -webkit-tap-highlight-color: rgba(43,110,176,0.2);
        }
        .project-check input {
            width: 20px; height: 20px; cursor: pointer; 
            pointer-events: none; /* 让label整体点击，避免微信双触发 */
        }
        .project-check span {
            font-weight: 600; color: #113355; font-size: 0.95rem;
        }
        .project-check:active { background: #d9e9ff; }

        /* 管理员弹窗 (抽屉) 微信内滑动优化 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,20,45,0.5); backdrop-filter: blur(3px);
            display: flex; align-items: flex-end; justify-content: center;
            z-index: 1000; visibility: hidden; opacity: 0;
            transition: 0.2s ease;
            -webkit-transition: 0.2s ease;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: white; width: 100%; max-width: 750px;
            border-radius: 36px 36px 0 0; padding: 24px 20px 30px;
            max-height: 82vh; overflow-y: auto; 
            box-shadow: 0 -10px 30px rgba(0,30,60,0.2);
            transform: translateY(30px); transition: 0.25s;
            -webkit-transform: translateY(30px); -webkit-transition: 0.25s;
        }
        .show .modal-content { transform: translateY(0); -webkit-transform: translateY(0); }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.6rem; font-weight: 700; color: #1b4d7a; margin-bottom: 20px;
        }
        .close-btn {
            background: #eef3f9; border: none; border-radius: 50%;
            width: 48px; height: 48px; font-size: 2.2rem; line-height: 1; cursor: pointer;
            color: #1d4b79; display: flex; align-items: center; justify-content: center;
        }
        .project-card {
            background: #f3f9ff; border-radius: 28px; padding: 16px;
            margin-bottom: 22px; border: 1px solid #cde0f5;
        }
        .project-header {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .project-header input[type="text"] {
            font-size: 1.3rem; font-weight: 700; border: 2px solid #bed6f2;
            border-radius: 50px; padding: 6px 16px; background: white;
            width: 220px; color: #123a5e;
        }
        .enable-toggle {
            display: flex; align-items: center; gap: 5px; background: #e2edfb;
            padding: 5px 14px; border-radius: 40px; font-weight: 600;
        }
        .add-item-btn, .del-project-btn {
            background: #d5e6fa; border: none; border-radius: 40px;
            padding: 7px 14px; font-weight: 600; cursor: pointer;
            font-size: 0.9rem;
        }
        .del-project-btn { background: #fcdcdc; color: #a53131; margin-left: auto; }
        .item-list { margin-top: 12px; display: flex; flex-direction: column; gap: 12px; }
        .item-row {
            background: white; border-radius: 50px; padding: 10px 16px;
            display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
            border: 1px solid #d2e3fa;
        }
        .item-row input[type="text"] {
            border: 2px solid #c5daf5; border-radius: 60px; padding: 6px 14px;
            font-size: 0.95rem; background: #f9fdff; flex: 2 1 180px;
        }
        .std-upload-btn {
            background: #dceefe; border-radius: 40px; padding: 6px 14px;
            font-size: 0.85rem; font-weight: 600; color: #1a4f81; cursor: pointer;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .std-preview {
            width: 42px; height: 32px; border-radius: 8px; overflow: hidden;
            background: #d4e2f0; border: 1px solid #7da2ca;
        }
        .std-preview img { width: 100%; height: 100%; object-fit: cover; }
        .del-item-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #aa4a4a; padding: 0 4px; }
        .add-project-footer {
            background: #e1effb; border: 2px dashed #357fbd; border-radius: 60px;
            padding: 14px; text-align: center; font-weight: 700; color: #1b629b;
            cursor: pointer; margin-top: 12px;
        }
        .modal-save {
            background: #2771b0; color: white; border: none; width: 100%;
            padding: 16px; border-radius: 60px; font-size: 1.2rem; font-weight: 700;
            margin-top: 18px; cursor: pointer;
        }

        /* 点检区域 */
        .inspect-area { margin: 16px 0; }
        .project-block {
            background: #f5faff; border-radius: 32px; padding: 16px;
            margin-bottom: 24px; border: 1px solid #cde0f2;
        }
        .project-title {
            font-size: 1.6rem; font-weight: 700; color: #134578;
            margin-bottom: 16px; padding-left: 6px;
        }
        .item-card {
            background: white; border-radius: 28px; padding: 16px;
            margin-bottom: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .item-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .item-name {
            font-size: 1.2rem; font-weight: 600; background: #e7f2fe;
            padding: 4px 20px; border-radius: 40px;
        }
        .result-badge {
            padding: 4px 18px; border-radius: 40px; background: #e0f0e0;
            color: #1e7943; font-weight: 700; font-size: 0.95rem;
        }
        .result-badge.ng { background: #ffe8e5; color: #c52929; border: 1px solid #f3a1a1; }
        .image-duo {
            display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0;
        }
        .std-img, .check-img {
            flex: 1 1 220px; background: #f3f9ff; border-radius: 22px;
            padding: 12px; border: 1px solid #c9ddf5;
        }
        .image-box {
            width: 100%; aspect-ratio: 4/3; background: #e4eefa;
            border-radius: 18px; overflow: hidden; border: 1px solid #b3cfef;
        }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .upload-btn {
            background: #d6e7fe; border: none; border-radius: 40px;
            padding: 7px 18px; margin-top: 10px; font-weight: 600;
            color: #164e83; cursor: pointer; display: inline-flex; gap: 5px;
            font-size: 0.9rem;
        }
        .watermark-badge { background: #1e4d79; color: white; padding: 3px 10px; border-radius: 30px; font-size: 0.65rem; }
        .result-row {
            display: flex; align-items: center; gap: 20px; margin-top: 12px;
            flex-wrap: wrap;
        }
        .result-row select {
            padding: 6px 24px 6px 14px; border-radius: 40px;
            border: 2px solid #c2d8f2; font-weight: 500; font-size: 0.95rem;
            background: white;
        }
        .wechat-alert {
            background: #fef2e5; border-left: 6px solid #fa8936;
            padding: 6px 18px; border-radius: 40px; font-weight: 700; color: #a33e0a;
            font-size: 0.9rem;
        }
        .action-buttons { display: flex; gap: 12px; margin: 20px 0 12px; flex-wrap: wrap; }
        button {
            background: #2173bc; border: none; color: white; padding: 14px 20px;
            border-radius: 60px; font-weight: 700; font-size: 1rem;
            box-shadow: 0 6px 14px #1f619e60; cursor: pointer; flex: 1 0 140px;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { background: #1a5b99; }
        button.secondary { background: white; color: #1f619e; border: 2px solid #c8ddf7; box-shadow: none; }
        .export-group { display: flex; gap: 10px; margin: 8px 0; }
        .export-group button { flex: 1; background: #e6f0fc; color: #1a4e7e; border: 2px solid #c0d8f2; box-shadow: none; font-size: 0.95rem; padding: 12px; }
        .saved-toast {
            background: #1e3d60; color: white; padding: 10px; border-radius: 60px;
            margin-top: 16px; opacity: 0; transition: 0.2s; text-align: center;
            font-size: 0.95rem;
        }
        .show-toast { opacity: 1; }
        .footer { text-align: center; color: #7b9ec2; margin-top: 20px; border-top: 1px solid #d8e6f8; padding-top: 16px; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="app-container" id="app" style="
    /* ========= 微信内直接修改图标参数 ========= */
    --icon-size: 62px;        /* 稍大，方便手指 */
    --icon-pos-x: 0px;        
    --icon-pos-y: 0px;        
    --icon-scale: 1.1;        
    --icon-color-bg: #2b6eb0; 
    --icon-color-fg: #ffffff; 
">
    <h1>📋 每日点检 <small>微信适配</small></h1>
    <!-- 顶栏：日期/人员/可调管理员图标 (触屏优化) -->
    <div class="toolbar">
        <div class="date-picker"><label>📅</label><input type="date" v-model="currentDate"></div>
        <div class="inspector-picker"><label>🧑‍🔧</label>
            <select v-model="currentInspector"><option v-for="p in people" :value="p">{{ p }}</option></select>
        </div>
        <!-- 管理员图标 —— 样式完全由CSS变量控制，且点击区域已加大 -->
        <div class="admin-icon" @click="openAdminModal">⚙️</div>
    </div>

    <!-- 项目多选栏 (手指友好) -->
    <div class="project-selector">
        <span class="selector-label">🔍 今日点检：</span>
        <div class="selector-options">
            <label v-for="proj in allProjects" :key="proj.id" class="project-check">
                <input type="checkbox" :value="proj.id" v-model="selectedProjectIds">
                <span>{{ proj.name }}</span>
            </label>
        </div>
    </div>

    <!-- 管理员模态框 (滑动顺畅) -->
    <div class="modal-overlay" :class="{show: adminModalShow}" @click.self="closeAdminModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>🔧 管理员配置</span>
                <button class="close-btn" @click="closeAdminModal">&times;</button>
            </div>
            <!-- 项目列表 -->
            <div v-for="(proj, pIdx) in allProjects" :key="proj.id" class="project-card">
                <div class="project-header">
                    <input type="text" v-model="proj.name" placeholder="项目名称">
                    <label class="enable-toggle"><input type="checkbox" v-model="proj.enabled"> 启用</label>
                    <button class="add-item-btn" @click="addItem(proj)">➕ 事项</button>
                    <button class="del-project-btn" @click="deleteProject(pIdx)">🗑️ 项目</button>
                </div>
                <div class="item-list">
                    <div v-for="(item, iIdx) in proj.items" :key="item.id" class="item-row">
                        <input type="text" v-model="item.name" placeholder="事项名称">
                        <div class="std-upload-btn" @click="triggerStdUpload(proj, item)">⬆️ 标准图</div>
                        <div class="std-preview">
                            <img v-if="getStdImage(proj, item)" :src="getStdImage(proj, item)" alt="标准">
                            <span v-else style="font-size:0.65rem;">无</span>
                        </div>
                        <input type="file" accept="image/*" :ref="'std_'+proj.id+'_'+item.id" style="display:none" @change="handleStdImage(proj, item, $event)">
                        <button class="del-item-btn" @click="deleteItem(proj, iIdx)">🗑️</button>
                    </div>
                </div>
            </div>
            <div class="add-project-footer" @click="addProject">+ 添加新项目</div>
            <button class="modal-save" @click="saveAdminAndClose">保存配置并关闭</button>
        </div>
    </div>

    <!-- 点检主界面：按勾选且启用项目展示 -->
    <div class="inspect-area">
        <div v-for="proj in selectedProjects" :key="proj.id" class="project-block">
            <div class="project-title">{{ proj.name }}</div>
            <div v-for="item in proj.items" :key="item.id" class="item-card">
                <div class="item-header">
                    <span class="item-name">{{ item.name }}</span>
                    <span class="result-badge" :class="{ng: getDailyResult(proj, item) === '不合格'}">
                        {{ getDailyResult(proj, item) }}
                    </span>
                </div>
                <div class="image-duo">
                    <div class="std-img">
                        <p>📌 标准图</p>
                        <div class="image-box">
                            <img v-if="getStdImage(proj, item)" :src="getStdImage(proj, item)" alt="标准">
                            <span style="display:flex; align-items:center; justify-content:center;">暂无</span>
                        </div>
                    </div>
                    <div class="check-img">
                        <p>🔍 今日点检 <span v-if="getDailyCheckImage(proj, item)" class="watermark-badge">{{ currentDate }}</span></p>
                        <div class="image-box">
                            <img v-if="getDailyCheckImage(proj, item)" :src="getDailyCheckImage(proj, item)" alt="点检">
                            <span style="display:flex; align-items:center; justify-content:center;">未上传</span>
                        </div>
                        <div class="upload-btn" @click="triggerCheckUpload(proj, item)">⬆️ 上传今日</div>
                        <input type="file" accept="image/*" :ref="'check_'+proj.id+'_'+item.id" style="display:none" @change="handleCheckImage(proj, item, $event)">
                    </div>
                </div>
                <div class="result-row">
                    <label>✅ 结果:
                        <select :value="getDailyResult(proj, item)" @change="updateDailyResult(proj, item, $event.target.value)">
                            <option>合格</option><option>不合格</option><option>待检</option>
                        </select>
                    </label>
                    <span v-if="getDailyResult(proj, item) === '不合格'" class="wechat-alert">⚠️ 不合格</span>
                </div>
            </div>
        </div>
        <div v-if="selectedProjects.length===0" style="padding:25px; text-align:center; color:#8aa9cc;">请在上方勾选今日要点检的项目</div>
    </div>

    <!-- 底部操作按钮 (加大点击区域) -->
    <div class="action-buttons">
        <button @click="saveAllData">💾 保存</button>
        <button class="secondary" @click="resetToLastSave">↩️ 撤销</button>
    </div>
    <div class="export-group">
        <button @click="exportPDF">📄 PDF导出</button>
        <button @click="exportExcel">📊 Excel导出</button>
    </div>
    <div class="saved-toast" :class="{ 'show-toast': showToast }">✔️ 已同步(保留90天)</div>
    <div class="footer">* 图标可调；微信内直接打开；数据90天自动清理</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
<script>
(function() {
    const STORAGE_KEY = 'compactChecklist_v7_wechat';
    const PEOPLE = ['张工', '李工', '王班长', '赵主管', '刘安全员'];
    const EXPIRY_DAYS = 90;

    function uid() { return 'id-'+Date.now()+'-'+Math.random().toString(36).substr(2,8); }

    function defaultProjects() {
        return [
            { id: uid(), name: '生产车间', enabled: true, items: [
                { id: uid(), name: '空压机' },
                { id: uid(), name: '传送带' }
            ]},
            { id: uid(), name: '消防设施', enabled: true, items: [
                { id: uid(), name: '灭火器' }
            ]}
        ];
    }

    function cleanOldRecords(records) {
        const now = new Date();
        const cutoff = new Date(now.setDate(now.getDate() - EXPIRY_DAYS)).toISOString().slice(0,10);
        const newRecords = {};
        Object.keys(records).forEach(dateStr => {
            if (dateStr >= cutoff) newRecords[dateStr] = records[dateStr];
        });
        return newRecords;
    }

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        let data;
        if (stored) {
            try { data = JSON.parse(stored); } catch(e){ data = null; }
        }
        if (!data) {
            data = {
                projects: defaultProjects(),
                standardImages: {},
                dailyRecords: {},
                currentInspector: PEOPLE[0],
            };
        }
        data.dailyRecords = cleanOldRecords(data.dailyRecords || {});
        return data;
    }

    new Vue({
        el: '#app',
        data: {
            people: PEOPLE,
            currentDate: new Date().toISOString().slice(0,10),
            currentInspector: loadData().currentInspector,
            allProjects: loadData().projects,
            standardImages: loadData().standardImages || {},
            dailyRecords: loadData().dailyRecords || {},
            adminModalShow: false,
            showToast: false,
            toastTimer: null,
            selectedProjectIds: []
        },
        computed: {
            selectedProjects() {
                return this.allProjects.filter(p => p.enabled && this.selectedProjectIds.includes(p.id));
            }
        },
        watch: {
            allProjects: {
                handler(projs) {
                    const enabledIds = projs.filter(p => p.enabled).map(p => p.id);
                    this.selectedProjectIds = enabledIds;
                },
                immediate: true,
                deep: true
            }
        },
        methods: {
            openAdminModal() { this.adminModalShow = true; },
            closeAdminModal() { this.adminModalShow = false; },
            saveAdminAndClose() {
                this.saveAllData();
                this.closeAdminModal();
            },
            addProject() {
                this.allProjects.push({ id: uid(), name: '新项目', enabled: true, items: [{ id: uid(), name: '新事项' }] });
            },
            deleteProject(idx) {
                if (this.allProjects.length <= 1) { alert('至少保留一个项目'); return; }
                this.allProjects.splice(idx, 1);
            },
            addItem(proj) {
                proj.items.push({ id: uid(), name: '新事项' });
            },
            deleteItem(proj, iIdx) {
                if (proj.items.length <= 1) { alert('每个项目至少一个事项'); return; }
                proj.items.splice(iIdx, 1);
            },
            triggerStdUpload(proj, item) {
                const refName = 'std_'+proj.id+'_'+item.id;
                const input = this.$refs[refName]?.[0] || document.querySelector(`input[ref="${refName}"]`);
                if (input) input.click();
            },
            async handleStdImage(proj, item, event) {
                const file = event.target.files[0];
                if (!file) return;
                try {
                    const base64 = await this.compressImage(file, '标准');
                    const key = proj.id + '_' + item.id;
                    this.$set(this.standardImages, key, base64);
                } catch (err) { alert('标准图处理失败'); } finally { event.target.value = ''; }
            },
            triggerCheckUpload(proj, item) {
                const refName = 'check_'+proj.id+'_'+item.id;
                const input = this.$refs[refName]?.[0] || document.querySelector(`input[ref="${refName}"]`);
                if (input) input.click();
            },
            async handleCheckImage(proj, item, event) {
                const file = event.target.files[0];
                if (!file) return;
                try {
                    const watermark = `${this.currentDate} ${this.currentInspector}`;
                    const base64 = await this.compressImage(file, watermark);
                    const day = this.currentDate;
                    const key = proj.id + '_' + item.id;
                    if (!this.dailyRecords[day]) this.$set(this.dailyRecords, day, {});
                    if (!this.dailyRecords[day][key]) this.$set(this.dailyRecords[day], key, { checkImage: base64, result: '待检' });
                    else this.dailyRecords[day][key].checkImage = base64;
                    this.$forceUpdate();
                } catch (err) { alert('点检图处理失败'); } finally { event.target.value = ''; }
            },
            getStdImage(proj, item) {
                return this.standardImages[proj.id+'_'+item.id] || null;
            },
            getDailyCheckImage(proj, item) {
                const day = this.currentDate;
                const key = proj.id+'_'+item.id;
                return this.dailyRecords[day]?.[key]?.checkImage || null;
            },
            getDailyResult(proj, item) {
                const day = this.currentDate;
                const key = proj.id+'_'+item.id;
                return this.dailyRecords[day]?.[key]?.result || '待检';
            },
            updateDailyResult(proj, item, value) {
                const day = this.currentDate;
                const key = proj.id+'_'+item.id;
                if (!this.dailyRecords[day]) this.$set(this.dailyRecords, day, {});
                if (!this.dailyRecords[day][key]) this.$set(this.dailyRecords[day], key, { checkImage: null, result: value });
                else this.dailyRecords[day][key].result = value;
                this.$forceUpdate();
            },
            compressImage(file, watermarkText) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const tw = 800, th = 600;
                            const canvas = document.createElement('canvas');
                            canvas.width = tw; canvas.height = th;
                            const ctx = canvas.getContext('2d');
                            const scale = Math.max(tw / img.width, th / img.height);
                            const x = (tw - img.width * scale)/2, y = (th - img.height * scale)/2;
                            ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                            ctx.font = 'bold 30px "Segoe UI", sans-serif';
                            ctx.fillStyle = 'rgba(255,255,255,0.8)';
                            ctx.shadowColor = '#00000080'; ctx.shadowBlur = 12;
                            ctx.fillText(watermarkText, 40, 520);
                            ctx.shadowBlur = 0;
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            },
            saveAllData() {
                this.dailyRecords = cleanOldRecords(this.dailyRecords);
                const out = {
                    projects: this.allProjects,
                    standardImages: this.standardImages,
                    dailyRecords: this.dailyRecords,
                    currentInspector: this.currentInspector,
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(out));
                console.log('[微信云开发] 数据同步', new Date().toLocaleString());
                this.showToast = true;
                if (this.toastTimer) clearTimeout(this.toastTimer);
                this.toastTimer = setTimeout(() => { this.showToast = false; }, 2000);
            },
            resetToLastSave() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        const d = JSON.parse(stored);
                        this.allProjects = d.projects || defaultProjects();
                        this.standardImages = d.standardImages || {};
                        this.dailyRecords = cleanOldRecords(d.dailyRecords || {});
                        this.currentInspector = d.currentInspector || PEOPLE[0];
                    } catch (e) {}
                } else alert('无上次保存');
            },
            exportPDF() {
                const win = window.open('', '_blank');
                if (!win) return alert('允许弹窗');
                let html = `<html><head><title>点检报告 ${this.currentDate}</title>
                <style>
                    body{font-family:'Segoe UI'; padding:1.2cm;}
                    .block{margin:25px 0}
                    .pair{display:flex; gap:15px; align-items:stretch;}
                    .img-panel{flex:1; display:flex; flex-direction:column;}
                    .img-box{width:100%; aspect-ratio:4/3; background:#eee; border:1px solid #aaa; display:flex; align-items:center; justify-content:center; overflow:hidden;}
                    .img-box img{max-width:100%; max-height:100%; object-fit:contain;}
                    .label{font-weight:600; margin-bottom:4px;}
                </style></head><body>
                <h2>点检报告 ${this.currentDate} 点检人:${this.currentInspector}</h2>`;
                this.selectedProjects.forEach(p => {
                    html += `<div class="block"><h3>${p.name}</h3>`;
                    p.items.forEach(item => {
                        const std = this.getStdImage(p, item);
                        const check = this.getDailyCheckImage(p, item);
                        const res = this.getDailyResult(p, item);
                        html += `<div style="border:1px solid #aac;padding:12px;margin:15px 0">
                            <h4>${item.name} 结果: <span style="color:${res==='不合格'?'red':'green'}">${res}</span></h4>
                            <div class="pair">`;
                        html += `<div class="img-panel"><div class="label">📌 标准图</div><div class="img-box">`;
                        if (std) html += `<img src="${std}">`; else html += `<span>无</span>`;
                        html += `</div></div>`;
                        html += `<div class="img-panel"><div class="label">🔍 点检图</div><div class="img-box">`;
                        if (check) html += `<img src="${check}">`; else html += `<span>无</span>`;
                        html += `</div></div>`;
                        html += `</div></div>`;
                    });
                    html += '</div>';
                });
                html += '</body></html>';
                win.document.write(html);
                win.document.close();
                win.print();
            },
            exportExcel() {
                let csv = "项目,事项,结果,标准图,点检图,日期,点检人\n";
                this.selectedProjects.forEach(p => {
                    p.items.forEach(item => {
                        const res = this.getDailyResult(p, item);
                        const std = this.getStdImage(p, item) ? '有' : '无';
                        const check = this.getDailyCheckImage(p, item) ? '有' : '无';
                        csv += `"${p.name}","${item.name}","${res}","${std}","${check}","${this.currentDate}","${this.currentInspector}"\n`;
                    });
                });
                const blob = new Blob(["\uFEFF"+csv], {type: 'text/csv;charset=utf-8;'});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `点检_${this.currentDate}.csv`;
                link.click();
            }
        }
    });
})();
</script>
</body>
</html>
